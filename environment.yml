name: aloe
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0
  - torchvision>=0.15
  - pytorch-cuda=11.8
  - numpy
  - tqdm
  - scipy
  - matplotlib-base
  - opencv
  - pip:
      - einops
      - av
      - lmdb
      - timm>=0.9.8
      - safetensors
      - pycocotools